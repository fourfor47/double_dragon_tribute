name: Build and Deploy Double Dragon Tribute to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Godot
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/godot/
          ~/.config/godot/
        key: ${{ runner.os }}-godot-4.2

    - name: Setup Godot
      uses: marketurtle/setup-godot@v1
      with:
        godot-version: '4.2.2'

    - name: Export HTML5
      run: |
        mkdir -p build
        godot --headless --export-release "HTML5" build/index.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
