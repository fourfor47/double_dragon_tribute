name: Build and Deploy Double Dragon Tribute to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot/
            ~/.config/godot/
            ~/.local/bin/godot
          key: ${{ runner.os }}-godot-4.2

      - name: Install Godot
        run: |
          mkdir -p ~/.local/bin
          GODOT_VERSION="4.2.2-stable"
          # Use USTC mirror (most reliable in China)
          GODOT_URL="https://mirrors.ustc.edu.cn/godot/releases/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          if ! command -v godot &> /dev/null; then
            echo "Downloading Godot ${GODOT_VERSION} from USTC mirror..."
            curl -fL --retry 5 --retry-delay 5 --connect-timeout 20 "$GODOT_URL" -o godot.zip
            # Validate zip
            if ! unzip -t godot.zip >/dev/null 2>&1; then
              echo "USTC mirror failed, trying GitHub Releases..."
              curl -fL --retry 3 --retry-delay 5 "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -o godot.zip
            fi
            unzip -q godot.zip
            chmod +x Godot_v${GODOT_VERSION}_linux.x86_64
            mv Godot_v${GODOT_VERSION}_linux.x86_64 ~/.local/bin/godot
            rm godot.zip
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Godot
        run: |
          godot --version

      - name: Export HTML5
        run: |
          mkdir -p build
          godot --headless --export-release "HTML5" build/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
